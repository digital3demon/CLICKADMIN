# Пример для Nginx перед Node (PM2 на 127.0.0.1:3000).
# Скопируйте в sites-enabled и подставьте server_name / путь к сертификатам.
#
# ChunkLoadError / 400 на /_next/static/ часто из‑за:
# - прокси не передаёт запрос в Node целиком;
# - ModSecurity / WAF режет URL с длинными именами файлов — отключите для /_next/ или whitelist.
#
# Проверка с сервера: curl -sI "http://127.0.0.1:3000/_next/static/chunks/" | head -5

upstream dental_lab_next {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    location / {
        proxy_pass http://dental_lab_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
